<!DOCTYPE html>
<html lang="en">
<head>
    <title>My First Website</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body{
            font-family: Arial, sans-serif;
            margin:0;
            background:#f4f4f4;
        }

        header{
            background:#333;
            color:white;
            padding:15px;
            text-align:center;
        }

        nav{
            background:#555;
            padding:10px;
            text-align:center;
        }

        nav a{
            color:white;
            margin:15px;
            text-decoration:none;
            font-weight:bold;
        }

        nav a:hover{
            color:yellow;
        }

        .container{
            padding:30px;
            text-align:center;
        }

        button{
            padding:12px 20px;
            background:blue;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:darkblue;
        }

        footer{
            background:#333;
            color:white;
            text-align:center;
            padding:10px;
            position:fixed;
            bottom:0;
            width:100%;
        }
    </style>
</head>

<body>

<header>
    <h1>Welcome to My Website</h1>
    <p>Learning HTML, Git and Web Development</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
</nav>

<div class="container">
    <h2>Hello Raman 👋</h2>
    <p>This is your first sample website.</p>
    <button onclick="showMessage()">Click Me</button>
</div>

<footer>
    <p>© 2026 My Website | Built with HTML</p>
</footer>

<script>
function showMessage(){
    alert("Welcome to your first website!");
}
</script>

</body>
</html>
